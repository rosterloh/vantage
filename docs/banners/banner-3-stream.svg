<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0a1428"/>
      <stop offset="1" stop-color="#04101f"/>
    </linearGradient>
    <linearGradient id="stream3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="soft3" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg3)"/>

  <!-- robot capture node (left) -->
  <g transform="translate(150,160)">
    <circle r="58" fill="#071a2c" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <circle r="72" fill="none" stroke="#10b981" stroke-width="1" opacity="0.25"/>
    <!-- camera -->
    <rect x="-30" y="-22" width="60" height="44" rx="8" fill="#0e2a3f" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="14" fill="#04121f" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#22d3ee"/>
    <circle cx="6" cy="-6" r="2.5" fill="#bef264"/>
    <text x="0" y="48" font-size="12.5" font-weight="600" fill="#5eead4" text-anchor="middle">robot cam</text>
  </g>

  <!-- operator screen node (right) -->
  <g transform="translate(1130,160)">
    <circle r="58" fill="#0a1228" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
    <circle r="72" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.25"/>
    <rect x="-34" y="-24" width="68" height="44" rx="5" fill="#0e1a38" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="-26" y="-16" width="52" height="28" rx="2" fill="#1e3a6b"/>
    <circle cx="-12" cy="-2" r="4.5" fill="#60a5fa"/><circle cx="6" cy="-2" r="4.5" fill="#60a5fa"/>
    <rect x="-9" y="24" width="18" height="5" rx="2" fill="#1e3a6b"/>
    <text x="0" y="48" font-size="12.5" font-weight="600" fill="#93c5fd" text-anchor="middle">operator</text>
  </g>

  <!-- flowing signal waveform connecting them -->
  <g fill="none" stroke="url(#stream3)">
    <path d="M222 160 Q 360 70, 500 160 T 780 160 T 1058 160" stroke-width="3" opacity="0.95"/>
    <path d="M222 160 Q 360 70, 500 160 T 780 160 T 1058 160" stroke-width="7" opacity="0.18" filter="url(#soft3)"/>
  </g>

  <!-- packets travelling -->
  <g fill="#a7f3d0">
    <circle r="4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M222 160 Q 360 70, 500 160 T 780 160 T 1058 160"/></circle>
    <circle r="4" fill="#7dd3fc"><animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite" path="M222 160 Q 360 70, 500 160 T 780 160 T 1058 160"/></circle>
    <circle r="4" fill="#93c5fd"><animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite" path="M222 160 Q 360 70, 500 160 T 780 160 T 1058 160"/></circle>
  </g>

  <!-- centered title over the stream -->
  <g text-anchor="middle">
    <text x="640" y="150" font-size="80" font-weight="700" fill="#f8fafc" letter-spacing="3">Vantage</text>
    <text x="640" y="190" font-size="18" font-weight="500" fill="#94a3b8" letter-spacing="0.5">Live onboard video &amp; telemetry over WebRTC</text>
    <text x="640" y="252" font-size="13" font-weight="600" fill="#64748b" letter-spacing="4">LAN-DIRECT · STUN · TURN · RUST</text>
  </g>
</svg>
