<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0f1b30"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="hub2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg2)"/>

  <!-- dotted starfield -->
  <g fill="#1d2a45">
    <circle cx="120" cy="60" r="1.5"/><circle cx="300" cy="40" r="1.5"/><circle cx="520" cy="70" r="1.5"/>
    <circle cx="1180" cy="50" r="1.5"/><circle cx="1080" cy="90" r="1.5"/><circle cx="700" cy="30" r="1.5"/>
    <circle cx="200" cy="280" r="1.5"/><circle cx="450" cy="300" r="1.5"/><circle cx="900" cy="290" r="1.5"/>
    <circle cx="1220" cy="250" r="1.5"/><circle cx="60" cy="200" r="1.5"/>
  </g>

  <!-- LEFT: title -->
  <g transform="translate(96,120)">
    <text x="0" y="0" font-size="74" font-weight="700" fill="#f1f5f9" letter-spacing="2">Vantage</text>
    <rect x="2" y="22" width="118" height="4" rx="2" fill="url(#accent2)"/>
    <text x="2" y="58" font-size="19" font-weight="500" fill="#94a3b8">One coordinator. Every robot. Every operator.</text>
    <text x="2" y="86" font-size="14" font-weight="500" fill="#64748b" letter-spacing="2.5">FLEET-WIDE WEBRTC TELEPRESENCE</text>
  </g>

  <!-- RIGHT: topology graph -->
  <g transform="translate(620,0)">
    <!-- connection links -->
    <g stroke="url(#accent2)" stroke-width="2" fill="none" opacity="0.55">
      <path d="M330 160 C 230 100, 170 90, 110 80"/>
      <path d="M330 160 C 230 150, 180 160, 120 165"/>
      <path d="M330 160 C 230 210, 180 240, 120 252"/>
      <path d="M330 160 C 440 110, 510 95, 560 92"/>
      <path d="M330 160 C 440 200, 510 230, 560 236"/>
    </g>

    <!-- animated packet dots -->
    <g fill="#22d3ee">
      <circle r="3.5"><animateMotion dur="2.6s" repeatCount="indefinite" path="M110 80 C 170 90, 230 100, 330 160"/></circle>
      <circle r="3.5"><animateMotion dur="3.1s" repeatCount="indefinite" path="M120 252 C 180 240, 230 210, 330 160"/></circle>
      <circle r="3.5" fill="#818cf8"><animateMotion dur="2.9s" repeatCount="indefinite" path="M560 92 C 510 95, 440 110, 330 160"/></circle>
    </g>

    <!-- central coordinator hub -->
    <circle cx="330" cy="160" r="46" fill="url(#hub2)"/>
    <circle cx="330" cy="160" r="46" fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.8"/>
    <circle cx="330" cy="160" r="60" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
    <text x="330" y="156" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">COORD</text>
    <text x="330" y="173" font-size="10.5" font-weight="500" fill="#c7d2fe" text-anchor="middle">discovery</text>

    <!-- robot nodes (left) -->
    <g>
      <g transform="translate(86,62)">
        <rect x="-22" y="-16" width="44" height="32" rx="7" fill="#16233d" stroke="#22d3ee" stroke-width="1.5"/>
        <circle cx="-8" cy="-2" r="4" fill="#22d3ee"/><circle cx="8" cy="-2" r="4" fill="#22d3ee"/>
        <text x="0" y="32" font-size="10" fill="#7dd3fc" text-anchor="middle" font-weight="600">robot-01</text>
      </g>
      <g transform="translate(92,165)">
        <rect x="-22" y="-16" width="44" height="32" rx="7" fill="#16233d" stroke="#22d3ee" stroke-width="1.5"/>
        <circle cx="-8" cy="-2" r="4" fill="#22d3ee"/><circle cx="8" cy="-2" r="4" fill="#22d3ee"/>
        <text x="0" y="32" font-size="10" fill="#7dd3fc" text-anchor="middle" font-weight="600">robot-02</text>
      </g>
      <g transform="translate(96,252)">
        <rect x="-22" y="-16" width="44" height="32" rx="7" fill="#16233d" stroke="#22d3ee" stroke-width="1.5"/>
        <circle cx="-8" cy="-2" r="4" fill="#22d3ee"/><circle cx="8" cy="-2" r="4" fill="#22d3ee"/>
        <text x="0" y="32" font-size="10" fill="#7dd3fc" text-anchor="middle" font-weight="600">robot-03</text>
      </g>
    </g>

    <!-- operator nodes (right) -->
    <g>
      <g transform="translate(582,92)">
        <rect x="-24" y="-17" width="48" height="34" rx="5" fill="#1e1b3a" stroke="#818cf8" stroke-width="1.5"/>
        <rect x="-16" y="-9" width="32" height="18" rx="2" fill="#312e6b"/>
        <text x="0" y="33" font-size="10" fill="#c7d2fe" text-anchor="middle" font-weight="600">operator</text>
      </g>
      <g transform="translate(582,236)">
        <rect x="-24" y="-17" width="48" height="34" rx="5" fill="#1e1b3a" stroke="#818cf8" stroke-width="1.5"/>
        <rect x="-16" y="-9" width="32" height="18" rx="2" fill="#312e6b"/>
        <text x="0" y="33" font-size="10" fill="#c7d2fe" text-anchor="middle" font-weight="600">operator</text>
      </g>
    </g>

    <!-- fleet stat chip -->
    <g transform="translate(248,272)">
      <rect x="0" y="0" width="164" height="28" rx="14" fill="#111c33" stroke="#1e3a5f" stroke-width="1"/>
      <circle cx="18" cy="14" r="4" fill="#34d399"/>
      <text x="30" y="18" font-size="11.5" font-weight="600" fill="#cbd5e1">3 streaming · 2 watching</text>
    </g>
  </g>
</svg>
